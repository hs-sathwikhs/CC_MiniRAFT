<!DOCTYPE html>
<html>
<head>
    <title>Mini-RAFT Gateway - Day 2 Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f7f9;
            min-height: 100vh;
            padding: 36px;
            color: #1f2937;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 36px;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
        }

        h1 {
            color: #111827;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 700;
        }

        .subtitle {
            color: #475569;
            font-size: 15px;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .status {
            padding: 18px 20px;
            border-radius: 16px;
            font-weight: 700;
            text-align: center;
            font-size: 14px;
            letter-spacing: 0.01em;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            color: #111827;
        }

        .connected {
            background: #f8fafc;
            color: #111827;
            border-color: #d1d5db;
        }

        .disconnected {
            background: #f9fafb;
            color: #374151;
            border-color: #d1d5db;
        }

        .leader-info {
            background: #ffffff;
            color: #111827;
            padding: 22px 24px;
            border-radius: 16px;
            margin-bottom: 22px;
            border: 1px solid #e5e7eb;
        }

        .leader-label {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 6px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .leader-details {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.25;
        }

        #messages {
            height: 360px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            padding: 18px;
            margin: 18px 0;
            background: #f8fafc;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            line-height: 1.8;
            border-radius: 14px;
            color: #334155;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #ffffff;
            color: #111827;
        }

        input:focus {
            outline: none;
            border-color: #9ca3af;
            box-shadow: 0 0 0 4px rgba(156, 163, 175, 0.12);
        }

        button {
            padding: 15px 22px;
            font-size: 14px;
            font-weight: 600;
            background: #111827;
            color: #ffffff;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            min-width: 150px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
        }

        button:hover {
            background: #1f2937;
            transform: translateY(-1px);
            border-color: rgba(255, 255, 255, 0.08);
        }

        button.secondary {
            background: #f8fafc;
            color: #111827;
            border-color: #d1d5db;
            box-shadow: none;
        }

        button.secondary:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-top: 24px;
        }

        .stat-item {
            background: #ffffff;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #e5e7eb;
            color: #111827;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .msg-system {
            color: #475569;
        }

        .msg-success {
            color: #111827;
        }

        .msg-error {
            color: #7f1d1d;
        }

        .msg-user {
            color: #111827;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mini-RAFT Gateway</h1>
        <div class="subtitle">Day 2: Leader Discovery & Stroke Routing Test Interface</div>
        
        <div class="status-panel">
            <div id="status" class="status disconnected">Gateway: Disconnected</div>
            <div id="leaderStatus" class="status disconnected">Leader: Unknown</div>
        </div>
        
        <div id="leaderInfo" class="leader-info" style="display:none;">
            <div class="leader-label">Current RAFT Leader</div>
            <div class="leader-details" id="leaderDetails">Discovering...</div>
        </div>
        
        <div id="messages"></div>
        
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Type a test stroke and press Enter">
            <button onclick="sendStroke()">Send Stroke</button>
            <button class="secondary" onclick="discoverLeader()">Find Leader</button>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">Sent</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="ackCount">0</div>
                <div class="stat-label">Acknowledged</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="errorCount">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>
    </div>
    
    <script>
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('status');
        const leaderStatusDiv = document.getElementById('leaderStatus');
        const leaderInfoDiv = document.getElementById('leaderInfo');
        const leaderDetailsDiv = document.getElementById('leaderDetails');
        const messageInput = document.getElementById('messageInput');
        
        let sentCount = 0;
        let ackCount = 0;
        let errorCount = 0;
        let currentLeader = null;
        
        // Connect to WebSocket
        const ws = new WebSocket('ws://' + window.location.host);
        
        ws.onopen = () => {
            statusDiv.className = 'status connected';
            statusDiv.textContent = 'Gateway: Connected';
            addMessage('Connected to Mini-RAFT Gateway', 'msg-system');
            
            // Auto-discover leader after connection
            setTimeout(discoverLeader, 500);
        };
        
        ws.onclose = () => {
            statusDiv.className = 'status disconnected';
            statusDiv.textContent = 'Gateway: Disconnected';
            leaderStatusDiv.className = 'status disconnected';
            leaderStatusDiv.textContent = 'Leader: Unknown';
            leaderInfoDiv.style.display = 'none';
            addMessage('Disconnected from gateway', 'msg-error');
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'welcome') {
                    addMessage(`Gateway: ${data.message}`, 'msg-system');
                } else if (data.type === 'ack') {
                    ackCount++;
                    updateStats();
                    addMessage(`Stroke forwarded to leader ${data.leaderId}`, 'msg-success');
                    updateLeaderStatus(data.leaderId);
                } else if (data.type === 'error') {
                    errorCount++;
                    updateStats();
                    addMessage(`Error: ${data.message}${data.error ? ' - ' + data.error : ''}`, 'msg-error');
                } else {
                    addMessage(`Gateway: ${JSON.stringify(data)}`, 'msg-system');
                }
            } catch (error) {
                addMessage(`Parse error: ${event.data}`, 'msg-error');
            }
        };
        
        ws.onerror = (error) => {
            addMessage('WebSocket error occurred', 'msg-error');
        };
        
        function sendStroke() {
            const text = messageInput.value.trim();
            if (!text) {
                addMessage('Please enter a message', 'msg-error');
                return;
            }
            
            const message = {
                type: 'stroke',
                content: text,
                timestamp: Date.now()
            };
            
            try {
                ws.send(JSON.stringify(message));
                sentCount++;
                updateStats();
                addMessage(`Sent: ${text}`, 'msg-user');
                messageInput.value = '';
            } catch (error) {
                errorCount++;
                updateStats();
                addMessage(`Failed to send: ${error.message}`, 'msg-error');
            }
        }
        
        function discoverLeader() {
            addMessage('Discovering current leader...', 'msg-system');
            
            fetch('/discover-leader')
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.leaderUrl) {
                        currentLeader = data.leaderId;
                        updateLeaderStatus(data.leaderId, data.leaderUrl);
                        addMessage(`Leader found: Replica ${data.leaderId} at ${data.leaderUrl}`, 'msg-success');
                    } else {
                        leaderStatusDiv.className = 'status disconnected';
                        leaderStatusDiv.textContent = 'Leader: Not Found';
                        leaderInfoDiv.style.display = 'none';
                        addMessage('No leader found; election may be in progress.', 'msg-system');
                    }
                })
                .catch(err => {
                    addMessage(`Failed to discover leader: ${err.message}`, 'msg-error');
                });
        }
        
        function updateLeaderStatus(leaderId, leaderUrl) {
            leaderStatusDiv.className = 'status connected';
            leaderStatusDiv.textContent = `Leader: Replica ${leaderId}`;
            leaderInfoDiv.style.display = 'block';
            leaderDetailsDiv.innerHTML = `<strong>Replica ${leaderId}</strong>` + 
                (leaderUrl ? `<br><small style="opacity:0.9;">${leaderUrl}</small>` : '');
        }
        
        function updateStats() {
            document.getElementById('sentCount').textContent = sentCount;
            document.getElementById('ackCount').textContent = ackCount;
            document.getElementById('errorCount').textContent = errorCount;
        }
        
        function addMessage(text, className = 'msg-system') {
            const time = new Date().toLocaleTimeString();
            const msgDiv = document.createElement('div');
            msgDiv.className = className;
            msgDiv.textContent = `[${time}] ${text}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Enter key to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendStroke();
        });
        
        // Auto-refresh stats every 5 seconds
        setInterval(() => {
            fetch('/stats')
                .then(res => res.json())
                .then(data => {
                    if (data.knownLeader && data.knownLeader !== currentLeader) {
                        currentLeader = data.knownLeader;
                        updateLeaderStatus(data.knownLeader, data.knownLeaderUrl);
                    }
                })
                .catch(err => console.error('Stats fetch failed:', err));
        }, 5000);
    </script>
</body>
</html>
