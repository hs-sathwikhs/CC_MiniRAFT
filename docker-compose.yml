version: "3.8"

services:
  gateway:
    image: node:18
    working_dir: /app
    volumes:
      - ./gateway:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=8080
      - REPLICA_URLS=http://replica1:5001,http://replica2:5002,http://replica3:5003
      - DOCKER_ENV=true
    ports:
      - "8080:8080"
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-network
    restart: unless-stopped

  replica1:
    image: node:18
    working_dir: /app
    volumes:
      - ./replica1:/app
    command: sh -c "npm install && node index.js"
    environment:
      - REPLICA_ID=1
      - PORT=5001
      - DOCKER_ENV=true
    ports:
      - "5001:5001"
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  replica2:
    image: node:18
    working_dir: /app
    volumes:
      - ./replica2:/app
    command: sh -c "npm install && node index.js"
    environment:
      - REPLICA_ID=2
      - PORT=5002
      - DOCKER_ENV=true
    ports:
      - "5002:5002"
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  replica3:
    image: node:18
    working_dir: /app
    volumes:
      - ./replica3:/app
    command: sh -c "npm install && node index.js"
    environment:
      - REPLICA_ID=3
      - PORT=5003
      - DOCKER_ENV=true
    ports:
      - "5003:5003"
    networks:
      - raft-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  raft-network:
    driver: bridge