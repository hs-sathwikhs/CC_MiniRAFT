version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DOCKER_ENV=1
      - REPLICA_URLS=http://replica1:5001,http://replica2:5002,http://replica3:5003
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/app
    networks:
      - raft-network

  replica1:
    build:
      context: ./replica1
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=1
      - PORT=5001
      - DOCKER_ENV=1
    ports:
      - "5001:5001"
    volumes:
      - ./replica1:/app
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  replica2:
    build:
      context: ./replica2
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=2
      - PORT=5002
      - DOCKER_ENV=1
    ports:
      - "5002:5002"
    volumes:
      - ./replica2:/app
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  replica3:
    build:
      context: ./replica3
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=3
      - PORT=5003
      - DOCKER_ENV=1
    ports:
      - "5003:5003"
    volumes:
      - ./replica3:/app
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  raft-network:
    driver: bridge
