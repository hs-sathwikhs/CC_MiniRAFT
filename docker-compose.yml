version: '3.8'

services:
  replica1:
    build:
      context: ./replica1
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=1
      - PORT=5001
      - DOCKER_ENV=1
    ports:
      - "5001:5001"
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  replica2:
    build:
      context: ./replica2
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=2
      - PORT=5002
      - DOCKER_ENV=1
    ports:
      - "5002:5002"
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  replica3:
    build:
      context: ./replica3
      dockerfile: Dockerfile
    environment:
      - REPLICA_ID=3
      - PORT=5003
      - DOCKER_ENV=1
    ports:
      - "5003:5003"
    networks:
      - raft-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  raft-network:
    driver: bridge
