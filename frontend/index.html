<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MiniRAFT Whiteboard - Day 1</title>
	<style>
		:root {
			--bg: #f3f6fb;
			--panel: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--line: #d1d5db;
			--brand: #0ea5e9;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
			color: var(--text);
			min-height: 100vh;
			padding: 16px;
		}

		.app {
			max-width: 1000px;
			margin: 0 auto;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
		}

		.topbar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 16px;
			border-bottom: 1px solid var(--line);
			background: #fbfdff;
		}

		.title {
			margin: 0;
			font-size: 18px;
		}

		.meta {
			font-size: 13px;
			color: var(--muted);
		}

		.toolbar {
			padding: 10px 16px;
			border-bottom: 1px solid var(--line);
			display: flex;
			gap: 10px;
			align-items: center;
		}

		button {
			border: none;
			background: var(--brand);
			color: #fff;
			padding: 8px 14px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: 600;
		}

		button:hover {
			opacity: 0.92;
		}

		.board-wrap {
			padding: 16px;
		}

		#board {
			display: block;
			width: 100%;
			max-width: 960px;
			height: 500px;
			border: 2px dashed #94a3b8;
			border-radius: 10px;
			background: #fff;
			margin: 0 auto;
		}
	</style>
</head>
<body>
	<main class="app">
		<header class="topbar">
			<h1 class="title">MiniRAFT Whiteboard - Day 1</h1>
			<span class="meta">Local draw test</span>
		</header>

		<section class="toolbar">
			<button id="clearBtn" type="button">Clear Board</button>
			<span class="meta">Click and drag on the board to draw.</span>
		</section>

		<section class="board-wrap">
			<canvas id="board" width="960" height="500"></canvas>
		</section>
	</main>

	<script src="./canvas.js"></script>
	<script>
		const clearBtn = document.getElementById("clearBtn");
		const board = document.getElementById("board");
		const boardCtx = board.getContext("2d");

		clearBtn.addEventListener("click", () => {
			boardCtx.clearRect(0, 0, board.width, board.height);
		});
	</script>
</body>
</html>
